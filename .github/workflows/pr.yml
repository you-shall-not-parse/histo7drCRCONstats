name: pull-requests

on:
  pull_request:
    branches:
      - 'main'

jobs:
  build-public-ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rcongui_public

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
      - run: npm ci
      - run: npm run build

  smoke-backend:
    runs-on: ubuntu-latest

    env:
      HLL_DB_PASSWORD: rcon_dev
      HLL_DB_NAME: rcon
      HLL_DB_USER: rcon
      HLL_DB_HOST: localhost
      HLL_DB_HOST_PORT: '5432'
      HLL_DB_URL: postgresql://rcon:rcon_dev@localhost:5432/rcon
      SERVER_NUMBER: '1'
      ARCHIVE_SITE_NAME: CRCON Archive
      PUBLIC_STATS_PORT: '81'
      PUBLIC_STATS_PORT_HTTPS: '444'
      RCONWEB_EXTERNAL_ADDRESS: localhost
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: install requirements
        run: |
          pip install -r requirements.txt --no-compile
      - name: compile archive backend
        run: |
          python -m compileall archive_core rconweb alembic manage.py
      - name: import archive backend
        run: |
          python -c "import sys; sys.path.insert(0, '.'); sys.path.insert(0, 'rconweb'); import archive_core.db; import archive_core.maps; import api.history_only; import rconweb.settings; print('import-ok')"
